# pytest configuration for the mTLS ED25519 API test suite.
#
# Layers (select with `-m <marker>`):
#   unit          Fast, pure-function tests — no network, no subprocess.
#   integration   Exercise the live FastAPI server behind mTLS.
#   e2e           Full client-to-server scenarios (placeholder for later phases).
#   slow          Tests that take > 1s; skipped in the default `unit` run.
#   security      TLS/authz/attack-surface tests (T2/T6 will populate this).
#   performance   Latency/load regressions (T4 will populate this).

[pytest]
testpaths = tests
asyncio_mode = auto
addopts = --tb=short --strict-markers -v
timeout = 30

markers =
    unit: Pure-function unit tests (no sockets, no subprocess).
    integration: Tests that start the live server and make real mTLS calls.
    e2e: End-to-end client-to-server scenarios.
    slow: Tests expected to take longer than one second.
    security: Security-focused tests (TLS, authz, injection).
    performance: Latency and throughput regression tests.
