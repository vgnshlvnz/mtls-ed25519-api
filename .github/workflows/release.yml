name: Release Gate

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # create GitHub Release

jobs:
  release-gate:
    name: Full release verification
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: End-to-end (clean / pki / server / test / stop)
        run: |
          make clean
          make pki
          # Start in background, probe, run matrices, stop.
          make server
          bash tests/curl_tests.sh
          bash tests/negative_tests.sh
          make stop

      - name: Full pytest suite
        run: |
          rm -f .coverage .coverage.*
          pytest --timeout=300
      - name: Assert every T1-T7 marker has at least one passing test
        run: |
          for m in unit integration security slow performance; do
            COUNT=$(pytest -m "$m" --collect-only -q 2>/dev/null | \
              grep -cE '^tests/' || true)
            [ "$COUNT" -ge 1 ] || { echo "FAIL: no tests under -m $m"; exit 1; }
          done

      - name: Generate release notes
        run: |
          {
            echo "# ${GITHUB_REF_NAME}"
            echo
            echo "## Test totals"
            pytest --collect-only -q 2>/dev/null | tail -5
            echo
            echo "## Coverage"
            coverage report --precision=1 2>/dev/null | tail -10 || true
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            RELEASE_NOTES.md
