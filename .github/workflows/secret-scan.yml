name: Secret Scan

on:
  schedule:
    - cron: '0 4 * * *'   # daily at 04:00 UTC
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Scan history for secrets
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Block .key files in history
        run: |
          if git log --all --full-history -- '*.key' | grep -q commit; then
            echo "FAIL: .key files found in git history"
            git log --all --full-history --oneline -- '*.key'
            exit 1
          fi
      - name: Block PEM private key headers in history
        run: |
          if git grep -InE '-----BEGIN (EC |RSA |OPENSSH )?PRIVATE KEY-----' \
              $(git rev-list --all) 2>/dev/null; then
            echo "FAIL: PEM private-key block found in git history"
            exit 1
          fi
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: false
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
