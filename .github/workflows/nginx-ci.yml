name: Nginx CI

# Standalone workflow for the v1.1 nginx termination layer. When the
# T8 ci.yml lands, these two jobs should be folded into it as
# Job 9 (nginx-config-lint) and Job 10 (nginx-auth-tests).

on:
  push:
    branches: [main, develop, 'feature/nginx-**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: nginx-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:

  # --- Job 9: nginx-config-lint --------------------------------------------
  nginx-config-lint:
    name: Nginx config lint
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install nginx + openssl
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends nginx openssl
      - name: Generate PKI (needed for nginx -t to read ca.crt / nginx.crt)
        run: ./pki_setup.sh --force
      - name: Generate test config + run nginx -t
        run: make nginx-check
      - name: Assert required directives are present in nginx.conf
        run: |
          for d in ssl_verify_client ssl_crl server_tokens; do
            if ! grep -q "$d" nginx/nginx.conf; then
              echo "FAIL: $d directive missing from nginx/nginx.conf"
              exit 1
            fi
          done
          echo "PASS: ssl_verify_client + ssl_crl + server_tokens present"

  # --- Job 10: nginx-auth-tests --------------------------------------------
  nginx-auth-tests:
    name: Nginx auth tests
    needs: nginx-config-lint
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt
      - name: Install nginx + openssl
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends nginx openssl
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Generate PKI
        run: ./pki_setup.sh --force
      - name: Verify PKI chain
        run: |
          openssl verify -CAfile pki/ca/ca.crt pki/server/server.crt
          openssl verify -CAfile pki/ca/ca.crt pki/client/client.crt
          openssl verify -CAfile pki/ca/ca.crt pki/nginx/nginx.crt
      - name: Run the nginx auth pytest suite
        # The nginx_stack fixture starts nginx + FastAPI itself; no
        # separate `make nginx-start` / `make server` needed for the
        # pytest path.
        run: |
          pytest tests/test_nginx_auth.py -v --timeout=60

      # --- Explicit separate step for the ND1 critical gate ----------
      - name: "ND1 CRITICAL — Header Injection Defence Check"
        # Start the stack ourselves for this step (the pytest run above
        # tore its fixture down at teardown), then curl directly to
        # FastAPI :8443 with a forged X-Client-CN + X-Client-Verify
        # header. The middleware MUST deny with {"error": "forbidden"}.
        run: |
          bash nginx/nginx-test-gen.sh
          MTLS_API_PORT=8443 NGINX_MODE=true TRUSTED_PROXY_IPS=127.0.0.1 \
            python server.py > /tmp/ci-nd1-api.log 2>&1 &
          API=$!
          for _ in 1 2 3 4 5 6 7 8; do
            curl -sf http://127.0.0.1:8443/health -H "X-Client-Verify: FAILED" \
              >/dev/null 2>&1 && break
            sleep 0.5
          done

          RESULT=$(curl -s http://127.0.0.1:8443/health \
            -H "X-Client-CN: client-01" \
            -H "X-Client-Verify: SUCCESS")
          echo "Response: $RESULT"
          echo "$RESULT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('error') == 'forbidden', (
              'ND1 FAIL: header injection not blocked; body=' + repr(d)
          )
          "
          echo "ND1 PASS — FastAPI correctly rejects forged X-Client-CN"
          kill -INT $API || true

      - name: Run the nginx auth matrix shell wrapper
        run: bash tests/nginx_auth_matrix.sh --quiet
