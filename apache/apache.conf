# mTLS ED25519 API — Apache httpd termination layer (v1.3 architecture).
#
# Mirrors the nginx v1.2 architecture using Apache 2.4 + mod_ssl.
# Client speaks mTLS to Apache on :443 (or :8445 for the unprivileged
# test rig); Apache verifies the client cert, checks the CRL, looks
# up the Subject CN against cn_allowlist.txt via RewriteMap, then
# forwards plain HTTP to FastAPI on 127.0.0.1:8443.
#
# Architectural invariant (v1.3): Apache is the SOLE authentication
# boundary, exactly as nginx is in v1.2. FastAPI is auth-blind. The
# four directives that encode this are SSLVerifyClient, SSLCARevocation*,
# RewriteMap cn_allowed, and the F-flag RewriteRule below. Removing
# any of them breaks the auth boundary.
#
# Required modules (a2enmod or LoadModule directives — the test
# template at apache-test.conf adds explicit LoadModule lines for
# the unprivileged test rig):
#     mod_ssl              TLS termination + SSL_CLIENT_S_DN_CN
#     mod_proxy            reverse proxy
#     mod_proxy_http       HTTP backend
#     mod_rewrite          RewriteMap allowlist enforcement
#     mod_headers          forwarding cert metadata downstream
#
# Placeholders substituted by apache/apache-test-gen.sh:
#     PKI_DIR             absolute path to pki/
#     APACHE_DIR          absolute path to apache/
#     LISTEN_PORT_HTTPS   defaults to 443 in production, 8445 in tests
#     LISTEN_PORT_HTTP    defaults to 80 in production, 8082 in tests

# Global ServerName — silences the "Could not reliably determine the
# server's fully qualified domain name" warning at startup.
ServerName localhost

# Don't disclose the Apache version in the Server header.
ServerTokens Prod
ServerSignature Off

# Listen on the HTTPS port. The test-gen script also injects the HTTP
# port (used by the redirect VirtualHost below).
Listen LISTEN_PORT_HTTPS

# Server-scoped SSLSessionCache (Apache refuses it inside <VirtualHost>).
# shmcb is Apache's shared-memory cache implementation — per-process safe.
# Path is the apache/logs dir which is writable by the worker user.
SSLSessionCache        "shmcb:APACHE_DIR/logs/ssl_scache(512000)"
SSLSessionCacheTimeout 300

# --- HTTPS VirtualHost (the v1.3 auth boundary) -----------------------------
<VirtualHost *:LISTEN_PORT_HTTPS>
    ServerName localhost

    # --- TLS identity presented to clients --------------------------------
    SSLEngine on
    SSLCertificateFile    PKI_DIR/apache/apache.crt
    SSLCertificateKeyFile PKI_DIR/apache/apache.key

    # Trust anchor for verifying client certs.
    SSLCACertificateFile  PKI_DIR/ca/ca.crt

    # Shared TLS protocol / cipher block.
    Include APACHE_DIR/ssl_params.conf

    # --- CRL — revocation enforced at the TLS layer ----------------------
    # SSLCARevocationCheck chain checks every cert in the presented chain
    # (including intermediates), not just the leaf. nginx's ssl_crl by
    # default only checks the leaf. See docs/apache_vs_nginx_behaviour.md
    # for the security implication.
    SSLCARevocationFile  PKI_DIR/ca/ca.crl
    SSLCARevocationCheck chain

    # --- mTLS — client cert REQUIRED -------------------------------------
    # SSLVerifyClient require: Apache returns HTTP 403 (NOT a TLS
    # handshake abort) if no cert is presented or the cert chain fails.
    # nginx's ssl_verify_client on returns HTTP 400 for the same case.
    # Tests in tests/test_apache_auth.py::TestGroupB lock this in.
    SSLVerifyClient require
    SSLVerifyDepth  2

    # Populate SSL_* variables in the request environment so that
    # mod_rewrite's RewriteCond can read them via %{ENV:SSL_CLIENT_S_DN_CN}.
    # Without this, mod_rewrite's lookup-key expansion does NOT see the
    # SSL_* variables (the SSL functions only register for top-level
    # CondPattern evaluation, not for the inner map-lookup key).
    SSLOptions +StdEnvVars

    # --- CN allowlist via RewriteMap (the authorization policy) ----------
    # Approach 1 (recommended for any non-trivial allowlist): RewriteMap
    # txt: file. Apache's mod_rewrite reads the file at request time
    # (with internal caching) and looks up the CN via O(log n) binary
    # search.
    #
    # Approach 2 (commented below): SSLRequire — works for a handful of
    # CNs but doesn't scale and produces less informative error pages.
    # Kept here as a documented alternative.
    #
    # Approach 1 — RewriteMap (active):
    #
    # IMPORTANT: the RewriteMap directive lives at <VirtualHost> scope
    # but the RewriteRule must run in PER-DIRECTORY phase to see the
    # SSL_* variables. Server-level RewriteRule fires before mod_ssl
    # populates the request env, so %{SSL:...} comes back empty and
    # every cert is rejected. Wrapping the rule in <Location "/">
    # forces per-directory evaluation and fixes that. This is a real
    # Apache trap; documented in docs/apache_vs_nginx_behaviour.md.
    RewriteEngine On
    RewriteMap cn_allowed "txt:APACHE_DIR/cn_allowlist.txt"

    <Location "/">
        RewriteEngine On

        # If the lookup returns the empty default, the CN isn't on the
        # list. The F flag returns HTTP 403; ErrorDocument 403 below
        # replaces the default HTML body with the project's canonical
        # JSON.
        RewriteCond "${cn_allowed:%{SSL:SSL_CLIENT_S_DN_CN}}" "^$"
        RewriteRule .* - [F,L]
    </Location>

    # Approach 2 — SSLRequire (alternative; uncomment to use):
    #     SSLRequire (    %{SSL_CLIENT_S_DN_CN} eq "client-01" \
    #                  or %{SSL_CLIENT_S_DN_CN} eq "client-02" )

    # --- 403 response body ------------------------------------------------
    # Apache's ErrorDocument cannot interpolate SSL variables in the
    # body itself (mod_ssl doesn't expand %{SSL_CLIENT_S_DN_CN} inside
    # ErrorDocument arguments). To match the nginx 403 schema as closely
    # as possible we:
    #   * Return a static JSON body via ErrorDocument 403
    #   * Surface the rejected CN in an X-Rejected-CN response header
    # Documented in docs/apache_vs_nginx_behaviour.md.
    ErrorDocument 403 '{"error":"forbidden","reason":"cn_not_allowlisted"}'

    <IfModule mod_headers.c>
        # always = also set the header on error responses (default sets
        # only on 2xx/3xx). env=!REDIRECT_STATUS keeps it from being
        # re-emitted on internal sub-requests.
        Header always set X-Rejected-CN "%{SSL_CLIENT_S_DN_CN}s" env=!REDIRECT_STATUS
        Header always set Content-Type "application/json" "expr=%{REQUEST_STATUS} == 403"

        # --- Forward cert metadata to FastAPI (audit only) -----------------
        # FastAPI does NOT enforce auth on these — they are observability
        # decoration. The v1.3 structural test (test_v13_structural.py)
        # fails CI if FastAPI ever reads them.
        RequestHeader set X-Client-CN     "%{SSL_CLIENT_S_DN_CN}s"
        RequestHeader set X-Client-Serial "%{SSL_CLIENT_M_SERIAL}s"
        RequestHeader set X-Client-DN     "%{SSL_CLIENT_S_DN}s"
        RequestHeader set X-Client-Verify "%{SSL_CLIENT_VERIFY}s"
    </IfModule>

    # --- Proxy to FastAPI -------------------------------------------------
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8443/
    ProxyPassReverse / http://127.0.0.1:8443/

    # --- Keepalive (so AE2 / NC keepalive tests can reuse the connection)
    KeepAlive On
    KeepAliveTimeout 5
    MaxKeepAliveRequests 100
</VirtualHost>

# --- HTTP -> HTTPS redirect -------------------------------------------------
# Plain HTTP serves nothing useful — bounce everyone to TLS.
Listen LISTEN_PORT_HTTP
<VirtualHost *:LISTEN_PORT_HTTP>
    ServerName localhost
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>
