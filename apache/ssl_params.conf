# Shared TLS protocol / cipher block for every <VirtualHost> with
# SSLEngine on. Mirrors nginx/ssl_params.conf.

# TLS 1.2+ floor — same invariant as v1.2 (nginx) and v1.0 (FastAPI).
SSLProtocol -all +TLSv1.2 +TLSv1.3

# OpenSSL "HIGH" minus known-broken primitives.
SSLCipherSuite HIGH:!aNULL:!MD5:!RC4:!EXPORT:!DES:!3DES
SSLHonorCipherOrder on

# Don't issue session tickets — nginx side has the same posture.
SSLUseStapling Off

# (SSLSessionCache lives at server-config scope in apache.conf — Apache
# rejects it inside a VirtualHost, which is where this Include is
# evaluated. Keep all VirtualHost-scoped TLS knobs in this file and
# leave the global ones in apache.conf.)
