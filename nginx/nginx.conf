# mTLS ED25519 API — nginx termination layer (v1.2 architecture).
#
# Client speaks mTLS on :443 (or :8444 for the local test rig) to this
# nginx; nginx verifies the client cert against pki/ca/ca.crt, enforces
# the CN allowlist via the map{} block below, checks the CRL, then
# forwards PLAIN HTTP to FastAPI on 127.0.0.1:8443.
#
# Architectural invariant (v1.2): nginx is the SOLE authentication
# boundary. FastAPI is completely auth-blind — any request that
# reaches the upstream has already passed every gate here. Do NOT
# attempt to re-check cert identity in the Python process; that was
# the v1.1 architecture and it is gone.
#
# Placeholders:
#     @@PROJECT_ROOT@@   absolute path to the repo root
# nginx/nginx-test-gen.sh substitutes these with literal paths to
# produce nginx/nginx-test.conf for the local test rig. Production
# deploys should substitute similarly via config management.

# One worker, single-master — enough for this lab.
worker_processes 1;

# Keep the pid file next to the test config so tests can SIGTERM
# without needing /run/nginx/.
pid @@PROJECT_ROOT@@/nginx/logs/nginx.pid;

error_log @@PROJECT_ROOT@@/nginx/logs/error.log warn;

events {
    worker_connections 1024;
}

http {
    # Default /var/lib/nginx paths require root; redirect into the
    # local log dir so non-root test runs work.
    client_body_temp_path @@PROJECT_ROOT@@/nginx/logs/body;
    proxy_temp_path       @@PROJECT_ROOT@@/nginx/logs/proxy;
    fastcgi_temp_path     @@PROJECT_ROOT@@/nginx/logs/fastcgi;
    uwsgi_temp_path       @@PROJECT_ROOT@@/nginx/logs/uwsgi;
    scgi_temp_path        @@PROJECT_ROOT@@/nginx/logs/scgi;

    # Audit log: mTLS verify state + extracted CN + allowlist decision
    # all land in one line so the security trail reads cleanly.
    log_format mtls '$remote_addr "$request" $status '
                    'verify=$ssl_client_verify cn="$ssl_client_cn" '
                    'allowed=$cn_allowed serial=$ssl_client_serial';
    access_log @@PROJECT_ROOT@@/nginx/logs/access.log mtls;

    # --- Identity extraction: Subject DN -> CN ------------------------------
    # OSS nginx does not expose $ssl_client_s_dn_cn (nginx Plus only).
    # Parse the RFC 2253 DN from $ssl_client_s_dn — typical shape is
    # "CN=client-01,O=Lab,C=MY" — and surface just the CN component.
    map $ssl_client_s_dn $ssl_client_cn {
        ~(?:^|,)\s*CN=(?<cn>[^,]+) $cn;
        default                    "";
    }

    # --- CN allowlist (v1.2 — the single source of truth) -------------------
    # This block IS the authorization policy. To admit a new client:
    #   1. Add its CN here.
    #   2. `nginx -s reload`.
    # There is no corresponding Python list; FastAPI has no say.
    #
    # A map{} lookup is O(1) in a hash table — thousands of CNs cost
    # the same as a handful. See tests/test_nginx_perf.py::NP3.
    map $ssl_client_cn $cn_allowed {
        default       0;
        "client-01"   1;
        "client-02"   1;
    }

    # Upstream is FastAPI on plain HTTP. In v1.2 the upstream NEVER
    # speaks TLS — all encryption terminates at this nginx.
    upstream fastapi_backend {
        server 127.0.0.1:8443;
        keepalive 32;
    }

    server {
        # 8444 is 443 in production; the local test config substitutes
        # an unprivileged port so `nginx -t` runs without sudo.
        listen 8444 ssl;
        server_name localhost;

        # --- TLS identity presented to clients --------------------------------
        ssl_certificate     @@PROJECT_ROOT@@/pki/nginx/nginx.crt;
        ssl_certificate_key @@PROJECT_ROOT@@/pki/nginx/nginx.key;

        include @@PROJECT_ROOT@@/nginx/ssl_params.conf;

        # --- Client-cert mTLS --------------------------------------------------
        ssl_client_certificate @@PROJECT_ROOT@@/pki/ca/ca.crt;
        ssl_verify_client      on;
        ssl_verify_depth       2;

        # CRL enforcement. ca.crl is regenerated by tests/revoke_client.sh
        # and by server.py::_refresh_crl at every FastAPI boot. After a
        # revocation, `nginx -s reload` picks up the new CRL.
        ssl_crl @@PROJECT_ROOT@@/pki/ca/ca.crl;

        # Don't advertise nginx version in responses.
        server_tokens off;

        location / {
            # --- CN allowlist enforcement (v1.2) ------------------------------
            # If the authenticated cert's CN is not in the map above,
            # return 403 with the project's canonical JSON body. The
            # upstream is never contacted — FastAPI does not even see
            # the request, which is the whole point of v1.2.
            if ($cn_allowed = 0) {
                add_header Content-Type application/json always;
                return 403 '{"error":"forbidden","cn":"$ssl_client_cn","reason":"cn_not_allowlisted"}';
            }

            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;

            # All proxy_set_header directives must live in this block:
            # nginx inheritance REPLACES (not merges) across scopes, so
            # a single directive here would wipe a sibling set at the
            # server{} level. Keep them together.
            #
            # The X-Client-* headers are forwarded for observability/
            # logging only — FastAPI is auth-blind in v1.2 and MUST NOT
            # make authorization decisions from them.
            proxy_set_header X-Client-CN          $ssl_client_cn;
            proxy_set_header X-Client-DN          $ssl_client_s_dn;
            proxy_set_header X-Client-Verify      $ssl_client_verify;
            proxy_set_header X-Client-Serial      $ssl_client_serial;
            proxy_set_header X-Client-Fingerprint $ssl_client_fingerprint;
            proxy_set_header X-Forwarded-For      $remote_addr;
            proxy_set_header Host                 $host;

            # Empty Connection header preserves keep-alive to the upstream
            # (see the keepalive directive on the upstream block).
            proxy_set_header Connection "";
        }
    }

    # Plain HTTP redirects to HTTPS — no API surface on port 80.
    server {
        listen 8081;
        server_name _;
        return 301 https://$host$request_uri;
    }
}
