# mTLS ED25519 API — nginx termination layer (v1.1 architecture).
#
# Client speaks mTLS on :443 to this nginx; nginx verifies the client
# cert against pki/ca/ca.crt, then forwards plain HTTP to FastAPI on
# 127.0.0.1:8443 with the peer-cert fields in request headers.
#
# This file is a TEMPLATE. `PKI_DIR` and `LOG_DIR` are placeholders
# that nginx/nginx-test-gen.sh substitutes with absolute paths for
# the local test config (nginx/nginx-test.conf). Production deploys
# should substitute similarly via configuration management.

# Run one worker, single-master setup is enough for this lab.
worker_processes 1;

# Keep the pid file next to the test config so tests can SIGTERM
# without needing /run/nginx/.
pid LOG_DIR/nginx.pid;

# Daemon off is overridden at launch; the default when nginx is run
# with `-c nginx-test.conf` is daemon on.
error_log LOG_DIR/error.log warn;

events {
    worker_connections 1024;
}

http {
    # Where nginx keeps its temp files — default /var/lib/nginx
    # requires root. Redirect to the local log dir so non-root
    # test runs work.
    client_body_temp_path  LOG_DIR/body;
    proxy_temp_path        LOG_DIR/proxy;
    fastcgi_temp_path      LOG_DIR/fastcgi;
    uwsgi_temp_path        LOG_DIR/uwsgi;
    scgi_temp_path         LOG_DIR/scgi;

    access_log LOG_DIR/access.log combined;

    # Extract the CN from the full client Subject DN.
    # OSS nginx does not expose ``$ssl_client_s_dn_cn`` directly
    # (that is nginx Plus). The map below parses the RFC 2253 DN
    # emitted on ``$ssl_client_s_dn`` — e.g. ``CN=client-01,O=Lab,C=MY``
    # — and surfaces just the CN component for the proxy header.
    map $ssl_client_s_dn $ssl_client_cn {
        ~(?:^|,)\s*CN=(?<cn>[^,]+) $cn;
        default                    "";
    }

    # Upstream is FastAPI on plain HTTP. N2 moves FastAPI off TLS
    # when NGINX_MODE=true; for now the plaintext forward still
    # terminates at the Python ssl layer.
    upstream fastapi_backend {
        server 127.0.0.1:8443;
        keepalive 32;
    }

    server {
        # HTTPS_PORT is 443 in production; the local test config
        # (nginx-test.conf) substitutes an unprivileged port so
        # `nginx -t` works without CAP_NET_BIND_SERVICE or sudo.
        listen HTTPS_PORT ssl;
        server_name localhost;

        # --- Server-side TLS material (N1) -----------------------
        ssl_certificate     PKI_DIR/nginx/nginx.crt;
        ssl_certificate_key PKI_DIR/nginx/nginx.key;

        # Shared TLS protocol / cipher block.
        include NGINX_CONF_DIR/ssl_params.conf;

        # --- Client cert mTLS ------------------------------------
        ssl_client_certificate PKI_DIR/ca/ca.crt;
        ssl_verify_client      on;
        ssl_verify_depth       2;

        # CRL enforcement is added in N3 once the CRL-rotation path
        # is confirmed stable end-to-end. Uncomment when N3 lands.
        # ssl_crl PKI_DIR/ca/ca.crl;

        # Don't advertise nginx version in the Server: header (T6 ID1
        # parity — FastAPI suppresses its own banner via uvicorn's
        # server_header=False).
        server_tokens off;

        # --- Forward client-cert fields to FastAPI ---------------
        # N2's dual-mode middleware reads these, but ONLY when
        # the request source IP is in config.TRUSTED_PROXY_IPS.
        # See docs/nginx_architecture.md §"Header trust model".
        proxy_set_header X-Client-CN          $ssl_client_cn;
        proxy_set_header X-Client-DN          $ssl_client_s_dn;
        proxy_set_header X-Client-Verify      $ssl_client_verify;
        proxy_set_header X-Client-Serial      $ssl_client_serial;
        proxy_set_header X-Client-Fingerprint $ssl_client_fingerprint;
        proxy_set_header X-Forwarded-For      $remote_addr;
        proxy_set_header Host                 $host;

        location / {
            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            # Empty Connection header preserves keep-alive to the
            # upstream (see the keepalive directive on the upstream
            # block). Without it, http/1.1 clients would close
            # every backend connection.
            proxy_set_header   Connection "";
        }
    }

    # Plain HTTP on :80 redirects to HTTPS — no API surface on port 80.
    server {
        # HTTP_PORT is 80 in production; unprivileged in the test
        # config (same rationale as HTTPS_PORT above).
        listen HTTP_PORT;
        server_name _;
        return 301 https://$host$request_uri;
    }
}
