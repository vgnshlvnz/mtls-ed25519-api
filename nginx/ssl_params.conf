# Shared TLS protocol / cipher block, included from every `server`
# that terminates TLS in the project. Keeping this in one file means
# a protocol bump (e.g. TLS 1.2 -> 1.3 floor) lands in one place.

ssl_protocols TLSv1.2 TLSv1.3;

# HIGH + explicit exclusions of known-weak families. OpenSSL 3.x has
# already dropped aNULL / MD5 / RC4 from the default enabled set; the
# explicit `!` guards stay as defence-in-depth against a future build
# that re-enables them.
ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
ssl_prefer_server_ciphers on;

# 10 MiB session cache (shared across workers; we only run one).
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 10m;
