# Shared TLS protocol / cipher settings for every server{} block.
#
# Included from nginx.conf via `include ... ssl_params.conf`. Keeps
# protocol hardening in one auditable place.

# TLS 1.2 floor mirrors the project invariant enforced elsewhere.
# (v1.1 had this on FastAPI's SSLContext; v1.2 moves it to nginx.)
ssl_protocols             TLSv1.2 TLSv1.3;

# Cipher list: OpenSSL "HIGH" minus known-broken primitives. Ed25519
# certs negotiate an AEAD suite (ECDHE-ECDSA-* or TLS_AES_*) so this
# list is mainly a belt-and-braces floor for TLS 1.2 suites.
ssl_ciphers               HIGH:!aNULL:!MD5:!RC4:!EXPORT:!DES:!3DES;
ssl_prefer_server_ciphers on;

# Session reuse to avoid paying the full handshake cost on reconnects.
ssl_session_cache         shared:SSL:10m;
ssl_session_timeout       10m;
ssl_session_tickets       off;
