# mutmut configuration (T9).
#
# Mutates the server-side Python modules and runs the fast layer of
# the test suite against each mutation. Slow / benchmark / load
# tests are excluded — a sub-10-minute run is the target.
#
# Run: mutmut run
# HTML: mutmut html && open html/index.html

[mutmut]
paths_to_mutate = server.py,middleware.py,tls.py,config.py,logging_config.py
runner = python -m pytest -m "unit or (integration and not slow)" -x -q --no-header
tests_dir = tests/
backup = False
